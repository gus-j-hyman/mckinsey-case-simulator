<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>McKinsey Style Case Bot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        mckinsey: { navy: '#051c2c', blue: '#005f9e', lightBg: '#f4f6f8', slate: '#334155', accent: '#e06b20' }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f6f8; }
        .reveal-content { max-height: 0; overflow: hidden; transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .reveal-content.open { max-height: 2500px; }
    </style>
</head>
<body class="text-gray-900 antialiased flex flex-col min-h-screen bg-[#f4f6f8]">

    <nav class="bg-[#051c2c] text-white py-4 px-6 border-b border-gray-800 shadow-md sticky top-0 z-50">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="w-3 h-6 bg-[#005f9e]"></div>
                <span class="text-sm font-bold uppercase tracking-widest text-gray-100">McKinsey Style Case Bot</span>
            </div>
            <span class="text-xs font-mono text-[#005f9e] bg-slate-900/80 px-3 py-1 rounded border border-slate-800 font-semibold">AI Deployment Environment</span>
        </div>
    </nav>

    <header class="max-w-5xl w-full mx-auto mt-8 px-4">
        <div class="bg-white p-6 rounded-lg border border-gray-200 shadow-sm">
            <h1 class="text-lg font-bold text-[#051c2c] mb-4 flex items-center">
                <span class="w-2 h-2 bg-[#005f9e] rounded-full mr-2"></span>
                Case Strategy Parameters
            </h1>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-gray-600 mb-2">Target Industry Vertical</label>
                    <select id="industry-select" class="w-full bg-white border border-gray-300 rounded p-2.5 text-sm font-medium text-gray-800 focus:ring-1 focus:ring-[#005f9e] outline-none cursor-pointer">
                        <option value="Consumer Packaged Goods (CPG)">Consumer Packaged Goods (CPG)</option>
                        <option value="Public Sector & Government Strategy">Public Sector & Government Strategy</option>
                        <option value="Retail Banking & Wealth Management">Retail Banking & Wealth Management</option>
                        <option value="Investment Banking & Capital Markets">Investment Banking & Capital Markets</option>
                        <option value="Renewable Energy & Cleantech">Renewable Energy & Cleantech</option>
                        <option value="Healthcare Delivery & Hospital Systems">Healthcare Delivery & Hospital Systems</option>
                        <option value="Pharmaceuticals & Biotechnology">Pharmaceuticals & Biotechnology</option>
                        <option value="SaaS & Enterprise Software">SaaS & Enterprise Software</option>
                        <option value="Hardware Manufacturing">Hardware Manufacturing</option>
                        <option value="Telecommunications Networks">Telecommunications Networks</option>
                        <option value="Commercial Aviation & Airlines">Commercial Aviation & Airlines</option>
                        <option value="Global Logistics & Supply Chain">Global Logistics & Supply Chain</option>
                        <option value="Automotive OEM & Mobility Systems">Automotive OEM & Mobility Systems</option>
                        <option value="Chemicals & Advanced Materials">Chemicals & Advanced Materials</option>
                        <option value="Commercial Real Estate Investment">Commercial Real Estate Investment</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-gray-600 mb-2">Strategic Case Type</label>
                    <select id="type-select" class="w-full bg-white border border-gray-300 rounded p-2.5 text-sm font-medium text-gray-800 focus:ring-1 focus:ring-[#005f9e] outline-none cursor-pointer">
                        <option value="Profitability / Operational Turnaround">Profitability / Operational Turnaround</option>
                        <option value="Market Entry Strategy">Market Entry Strategy</option>
                        <option value="M&A Commercial Target Diligence">M&A Commercial Target Diligence</option>
                        <option value="Pricing Architecture Optimization">Pricing Architecture Optimization</option>
                        <option value="Private Equity Value Creation">Private Equity Value Creation</option>
                        <option value="Digital Transformation & Core Enterprise Tech">Digital Transformation & Core Enterprise Tech</option>
                        <option value="Growth & Top-Line Revenue Optimization">Growth & Top-Line Revenue Optimization</option>
                        <option value="Organizational Restructuring & Design">Organizational Restructuring & Design</option>
                        <option value="Supply Chain Optimization & Sourcing">Supply Chain Optimization & Sourcing</option>
                    </select>
                </div>
                <div class="flex items-end">
                    <button onclick="executeCaseGenerationEngine()" class="w-full bg-[#005f9e] hover:bg-blue-800 text-white font-semibold text-xs py-3 px-4 rounded shadow-sm transition duration-150 uppercase tracking-widest">
                        Generate Custom Case Model
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main id="workspace" class="max-w-5xl w-full mx-auto mt-8 px-4 mb-24 hidden">
        </main>

    <script>
        let globalChartInstance = null;

        function toggleAnswerContainer(id) {
            const content = document.getElementById(id);
            const indicator = document.getElementById('ind-' + id);
            if (content.classList.contains('open')) {
                content.classList.remove('open');
                indicator.innerHTML = '&#9662;';
            } else {
                content.classList.add('open');
                indicator.innerHTML = '&#9652;';
            }
        }

        function executeCaseGenerationEngine() {
            const industry = document.getElementById('industry-select').value;
            const caseType = document.getElementById('type-select').value;
            const workspace = document.getElementById('workspace');
            
            workspace.classList.remove('hidden');
            const data = parseCaseEngineLogic(industry, caseType);
            
            workspace.innerHTML = `
                <div class="bg-white rounded-lg border border-gray-200 shadow-sm mb-8 overflow-hidden">
                    <div class="bg-[#051c2c] text-white p-6 border-b border-gray-800">
                        <span class="text-xs font-bold uppercase tracking-widest text-[#005f9e] block mb-1">Active Diagnostic Scenario</span>
                        <h2 class="text-3xl font-bold tracking-tight">${data.clientName}</h2>
                    </div>
                    <div class="p-8 space-y-6">
                        <div>
                            <h3 class="text-sm font-bold uppercase tracking-wider text-[#051c2c] mb-1">Client Goal</h3>
                            <p class="text-base font-semibold text-gray-900">${data.clientGoal}</p>
                        </div>
                        <hr class="border-gray-100" />
                        <div>
                            <h3 class="text-sm font-bold uppercase tracking-wider text-[#051c2c] mb-2">Situation Description</h3>
                            <div class="text-sm text-gray-700 leading-relaxed space-y-4">
                                <p>${data.situation_p1}</p>
                                <p>${data.situation_p2}</p>
                            </div>
                        </div>
                        <hr class="border-gray-100" />
                        <div>
                            <h3 class="text-sm font-bold uppercase tracking-wider text-[#051c2c] mb-2">McKinsey Study</h3>
                            <div class="bg-slate-50 border-l-4 border-[#051c2c] p-4 text-sm font-medium text-[#051c2c] italic rounded-r">
                                ${data.study}
                            </div>
                        </div>
                    </div>
                </div>

                <div class="text-center mb-8">
                    <h2 class="text-xl font-bold text-gray-800 uppercase tracking-widest">Practice Case Questions</h2>
                    <div class="w-16 h-1 bg-[#005f9e] mx-auto mt-3"></div>
                </div>

                <div class="bg-white rounded-lg border border-gray-200 shadow-sm mb-8 overflow-hidden">
                    <div class="p-6 border-b border-gray-100 bg-slate-50/50">
                        <span class="text-xs font-bold uppercase tracking-wider text-slate-500">Question 1</span>
                    </div>
                    <div class="p-8">
                        <h3 class="text-lg font-bold text-[#051c2c] mb-6">${data.q1_prompt}</h3>
                        <button onclick="toggleAnswerContainer('ans-1')" class="w-full flex justify-between items-center border border-gray-200 rounded p-4 text-sm font-semibold text-[#005f9e] hover:bg-slate-50 transition bg-white shadow-sm">
                            <span>Reveal Ideal Answer</span>
                            <span id="ind-ans-1" class="text-xs font-mono">&#9662;</span>
                        </button>
                        <div id="ans-1" class="reveal-content bg-white">
                            <div class="p-6 mt-4 border border-gray-100 bg-slate-50/40 rounded text-sm text-gray-700 leading-relaxed">${data.q1_answer}</div>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-lg border border-gray-200 shadow-sm mb-8 overflow-hidden">
                    <div class="p-6 border-b border-gray-100 bg-slate-50/50">
                        <span class="text-xs font-bold uppercase tracking-wider text-slate-500">Question 2</span>
                    </div>
                    <div class="p-8">
                        <h3 class="text-lg font-bold text-[#051c2c] mb-4">${data.q2_prompt}</h3>
                        <ul class="list-disc pl-6 mb-6 text-sm text-gray-700 space-y-1">
                            ${data.q2_bullets}
                        </ul>
                        <div class="mb-6 p-3 bg-blue-50 border border-blue-100 text-[#005f9e] text-xs font-semibold rounded">
                            Helpful hint: Calculators are not allowed—you may want to write out your calculations on paper.
                        </div>
                        <button onclick="toggleAnswerContainer('ans-2')" class="w-full flex justify-between items-center border border-gray-200 rounded p-4 text-sm font-semibold text-[#005f9e] hover:bg-slate-50 transition bg-white shadow-sm">
                            <span>Reveal Ideal Answer</span>
                            <span id="ind-ans-2" class="text-xs font-mono">&#9662;</span>
                        </button>
                        <div id="ans-2" class="reveal-content bg-white">
                            <div class="p-6 mt-4 border border-gray-100 bg-slate-50/40 rounded text-sm text-gray-700 leading-relaxed">${data.q2_answer}</div>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-lg border border-gray-200 shadow-sm mb-8 overflow-hidden">
                    <div class="p-6 border-b border-gray-100 bg-slate-50/50">
                        <span class="text-xs font-bold uppercase tracking-wider text-slate-500">Question 3</span>
                    </div>
                    <div class="p-8">
                        <h3 class="text-lg font-bold text-[#051c2c] mb-6">${data.q3_prompt}</h3>
                        
                        <div class="w-full bg-white p-6 rounded border border-gray-200 shadow-inner mb-6">
                            <div class="w-full h-[360px] relative">
                                <canvas id="canvasRenderZone"></canvas>
                            </div>
                        </div>

                        <button onclick="toggleAnswerContainer('ans-3')" class="w-full flex justify-between items-center border border-gray-200 rounded p-4 text-sm font-semibold text-[#005f9e] hover:bg-slate-50 transition bg-white shadow-sm">
                            <span>Reveal Ideal Answer</span>
                            <span id="ind-ans-3" class="text-xs font-mono">&#9662;</span>
                        </button>
                        <div id="ans-3" class="reveal-content bg-white">
                            <div class="p-6 mt-4 border border-gray-100 bg-slate-50/40 rounded text-sm text-gray-700 leading-relaxed">${data.q3_answer}</div>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-lg border border-gray-200 shadow-sm mb-8 overflow-hidden">
                    <div class="p-6 border-b border-gray-100 bg-slate-50/50">
                        <span class="text-xs font-bold uppercase tracking-wider text-slate-500">Question 4</span>
                    </div>
                    <div class="p-8">
                        <h3 class="text-lg font-bold text-[#051c2c] mb-6">${data.q4_prompt}</h3>
                        <button onclick="toggleAnswerContainer('ans-4')" class="w-full flex justify-between items-center border border-gray-200 rounded p-4 text-sm font-semibold text-[#005f9e] hover:bg-slate-50 transition bg-white shadow-sm">
                            <span>Reveal Ideal Answer</span>
                            <span id="ind-ans-4" class="text-xs font-mono">&#9662;</span>
                        </button>
                        <div id="ans-4" class="reveal-content bg-white">
                            <div class="p-6 mt-4 border border-gray-100 bg-slate-50/40 rounded text-sm text-gray-700 leading-relaxed">${data.q4_answer}</div>
                        </div>
                    </div>
                </div>
            `;

            executeChartEngineAllocation(data.chartType, data.chartConfig);
            workspace.scrollIntoView({ behavior: 'smooth' });
        }

        function executeChartEngineAllocation(type, config) {
            const canvas = document.getElementById('canvasRenderZone');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            if (globalChartInstance) { globalChartInstance.destroy(); }

            let chartJsConfig = {
                plugins: [{
                    beforeDraw: (chart) => {
                        const cCtx = chart.ctx;
                        cCtx.save();
                        cCtx.fillStyle = '#ffffff';
                        cCtx.fillRect(0, 0, chart.width, chart.height);
                        cCtx.restore();
                    }
                }],
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        title: { display: true, text: config.title, color: '#051c2c', font: { family: 'Inter', size: 14, weight: '700' }, padding: { bottom: 15 } },
                        legend: { display: ['bubble', 'dualAxis', 'stackedBar100', 'groupedBar', 'mixed'].includes(type), labels: { font: { family: 'Inter', size: 11, weight: '500' } } }
                    }
                }
            };

            switch(type) {
                case 'bubble':
                    chartJsConfig.type = 'bubble';
                    chartJsConfig.data = { datasets: config.datasets.map((ds, i) => ({ label: ds.label, data: ds.data, backgroundColor: i === 0 ? 'rgba(0, 95, 158, 0.75)' : 'rgba(51, 65, 85, 0.65)' })) };
                    chartJsConfig.options.scales = { x: { title: { display: true, text: 'Market Attractiveness (0-100)'} }, y: { title: { display: true, text: 'Competitive Strength (0-100)' } } };
                    break;
                case 'inverted':
                    chartJsConfig.type = 'line';
                    chartJsConfig.data = { labels: config.labels, datasets: [{ label: config.datasets[0].label, data: config.datasets[0].data, borderColor: '#005f9e', backgroundColor: 'rgba(0, 95, 158, 0.05)', fill: true, tension: 0.1 }] };
                    chartJsConfig.options.scales = { y: { reverse: true, title: { display: true, text: 'Operational Defect Rate / Cost Depth'} } };
                    break;
                case 'waterfall':
                    chartJsConfig.type = 'bar';
                    chartJsConfig.data = { labels: config.labels, datasets: [{ label: config.datasets[0].label, data: config.datasets[0].data, backgroundColor: config.labels.map((_, i) => i === 0 || i === config.labels.length - 1 ? '#051c2c' : '#005f9e') }] };
                    break;
                case 'dualAxis':
                    chartJsConfig.type = 'bar';
                    chartJsConfig.data = { labels: config.labels, datasets: [ { type: 'bar', label: config.datasets[0].label, data: config.datasets[0].data, backgroundColor: '#005f9e', yAxisID: 'y' }, { type: 'line', label: 'Secondary Metric %', data: config.datasets[0].extraData, borderColor: '#e06b20', yAxisID: 'y1', borderWidth: 3, fill: false } ] };
                    chartJsConfig.options.scales = { y: { position: 'left' }, y1: { position: 'right', grid: { drawOnChartArea: false } } };
                    break;
                case 'stackedBar100':
                    chartJsConfig.type = 'bar';
                    chartJsConfig.data = { labels: config.labels, datasets: config.datasets.map((ds, idx) => ({ label: ds.label, data: ds.data, backgroundColor: idx === 0 ? '#051c2c' : idx === 1 ? '#005f9e' : '#94a3b8' })) };
                    chartJsConfig.options.scales = { x: { stacked: true }, y: { stacked: true, max: 100 } };
                    break;
                case 'radar':
                    chartJsConfig.type = 'radar';
                    chartJsConfig.data = { labels: config.labels, datasets: config.datasets.map(ds => ({ label: ds.label, data: ds.data, borderColor: '#005f9e', backgroundColor: 'rgba(0, 95, 158, 0.2)' })) };
                    break;
                case 'scatter':
                    chartJsConfig.type = 'scatter';
                    chartJsConfig.data = { datasets: [{ label: config.datasets[0].label, data: config.datasets[0].data, backgroundColor: '#051c2c' }] };
                    break;
                case 'stepline':
                    chartJsConfig.type = 'line';
                    chartJsConfig.data = { labels: config.labels, datasets: [{ label: config.datasets[0].label, data: config.datasets[0].data, stepped: true, borderColor: '#005f9e', fill: false }] };
                    break;
                case 'polarArea':
                    chartJsConfig.type = 'polarArea';
                    chartJsConfig.data = { labels: config.labels, datasets: [{ data: config.datasets[0].data, backgroundColor: ['#051c2c', '#005f9e', '#475569', '#94a3b8', '#cbd5e1'] }] };
                    break;
                case 'doughnut':
                    chartJsConfig.type = 'doughnut';
                    chartJsConfig.data = { labels: config.labels, datasets: [{ data: config.datasets[0].data, backgroundColor: ['#051c2c', '#005f9e', '#64748b', '#cbd5e1'] }] };
                    break;
                case 'line':
                    chartJsConfig.type = 'line';
                    chartJsConfig.data = { labels: config.labels, datasets: [{ label: config.datasets[0].label, data: config.datasets[0].data, borderColor: '#051c2c', borderWidth: 2, fill: false }] };
                    break;
                case 'bar':
                    chartJsConfig.type = 'bar';
                    chartJsConfig.data = { labels: config.labels, datasets: [{ label: config.datasets[0].label, data: config.datasets[0].data, backgroundColor: '#005f9e' }] };
                    break;
                case 'groupedBar':
                    chartJsConfig.type = 'bar';
                    chartJsConfig.data = { labels: config.labels, datasets: [ { label: 'Baseline', data: config.datasets[0].data, backgroundColor: '#475569' }, { label: 'Proposed', data: config.datasets[0].extraData, backgroundColor: '#005f9e' } ] };
                    break;
                case 'mixed':
                    chartJsConfig.type = 'bar';
                    chartJsConfig.data = { labels: config.labels, datasets: [ { type: 'bar', label: 'Volume', data: config.datasets[0].data, backgroundColor: '#051c2c' }, { type: 'line', label: 'Rate', data: config.datasets[0].extraData, borderColor: '#005f9e', fill: false } ] };
                    break;
                case 'area':
                    chartJsConfig.type = 'line';
                    chartJsConfig.data = { labels: config.labels, datasets: [{ label: config.datasets[0].label, data: config.datasets[0].data, backgroundColor: 'rgba(5, 28, 44, 0.12)', borderColor: '#051c2c', fill: true }] };
                    break;
            }

            globalChartInstance = new Chart(ctx, chartJsConfig);
        }

        function parseCaseEngineLogic(industry, type) {
            // Arrays for Procedural Generation
            const fakeCompanies = ["AeroNova Solutions", "Zenith Corp", "Velo Global", "Horizon Enterprises", "Vanguard Systems", "Luxis Premium", "Integra Holdings", "Solari Group", "TelcoLink", "Stera Advanced", "OmniChannel Inc"];
            const clientName = fakeCompanies[Math.floor(Math.random() * fakeCompanies.length)];

            const timelines = ["over the next 18 months", "by the end of the upcoming fiscal year", "within a strict 24-month transformation window", "in the next 3 quarters", "before their anticipated IPO in 12 months"];
            const timeline = timelines[Math.floor(Math.random() * timelines.length)];

            const backgrounds = [
                "They boast a massive, loyal customer base but are burdened by an incredibly bloated, legacy middle-management structure.",
                "They have best-in-class R&D and product quality, but their physical distribution network is fragmented and highly inefficient.",
                "They historically dominated their sector through sheer scale, but their digital infrastructure is outdated and prone to failure.",
                "They command premium pricing power in the market, but their supply chain relies entirely on a single vulnerable geographic corridor."
            ];
            const background = backgrounds[Math.floor(Math.random() * backgrounds.length)];

            // Cohesive "Initiative" that links Q1, Q2, Q3, and Q4
            const initiatives = [
                {
                    action: "consolidate their regional facilities into a single automated mega-hub",
                    metric: "fixed overhead costs",
                    chartTopic: "Facility Output vs Operating Expense Variance",
                    risk: "massive operational downtime during the transition and unionized labor strikes"
                },
                {
                    action: "launch a direct-to-consumer digital subscription model",
                    metric: "customer acquisition cost (CAC)",
                    chartTopic: "Digital Churn Rate vs Subscriber Acquisition Cost",
                    risk: "severe cannibalization of their highly profitable legacy retail channels"
                },
                {
                    action: "renegotiate and offshore their primary manufacturing contracts",
                    metric: "unit variable costs",
                    chartTopic: "Vendor Defect Rates vs Procurement Savings",
                    risk: "a catastrophic drop in product quality leading to permanent brand damage"
                },
                {
                    action: "aggressively enter a neighboring emerging market",
                    metric: "market share capture",
                    chartTopic: "Regional Competitor Density vs Revenue Yield",
                    risk: "complex, unpredictable local regulatory barriers shutting down operations"
                }
            ];
            const coreInitiative = initiatives[Math.floor(Math.random() * initiatives.length)];

            // Question 2 Dynamic Math Generation (Current vs Proposed state)
            const currentVolume = Math.floor(Math.random() * 5 + 5) * 10; // 50 to 90 units/users
            const currentCost = (Math.random() * 5 + 10).toFixed(0); // $10 to $15
            const currentRevenue = (currentCost * 1.5).toFixed(0); // 50% markup
            const totalCurrentProfit = currentVolume * (currentRevenue - currentCost);

            const proposedFixedInvestment = Math.floor(Math.random() * 4 + 2) * 50; // 100, 150, 200, 250
            const proposedVariableDrop = (currentCost * 0.3).toFixed(0); // drops cost by 30%
            const newVariableCost = currentCost - proposedVariableDrop;
            
            const breakEvenVolume = Math.ceil(proposedFixedInvestment / proposedVariableDrop);

            // Chart Generation tied to the Initiative
            const chartPool = ['bubble', 'inverted', 'waterfall', 'dualAxis', 'stackedBar100', 'radar', 'scatter', 'stepline', 'polarArea', 'doughnut', 'line', 'bar', 'groupedBar', 'mixed', 'area'];
            const targetedChartType = chartPool[Math.floor(Math.random() * chartPool.length)];

            let calculatedChartConfig = {
                title: coreInitiative.chartTopic,
                labels: ['Q1', 'Q2', 'Q3', 'Q4', 'YTD'],
                datasets: [{ label: 'Primary Indicator', data: [80, 95, 60, 120, 150], extraData: [12, 18, 15, 22, 30] }]
            };

            if (targetedChartType === 'waterfall') {
                calculatedChartConfig.labels = ['Current Runrate', 'Projected Savings', 'Transition Fines', 'New Efficiency', 'Proposed Net Output'];
                calculatedChartConfig.datasets[0].data = [[0, 500], [500, 650], [550, 650], [550, 720], [0, 720]];
            } else if (targetedChartType === 'bubble') {
                calculatedChartConfig.datasets = [
                    { label: 'Core Segments', data: [{ x: 25, y: 40, r: 15 }, { x: 50, y: 70, r: 25 }, { x: 80, y: 60, r: 20 }] },
                    { label: 'Pilot Segments', data: [{ x: 20, y: 30, r: 10 }, { x: 65, y: 50, r: 18 }] }
                ];
            } else if (targetedChartType === 'stackedBar100') {
                calculatedChartConfig.labels = ['Alpha', 'Beta', 'Gamma'];
                calculatedChartConfig.datasets = [
                    { label: 'Category X', data: [40, 50, 30] },
                    { label: 'Category Y', data: [35, 25, 45] },
                    { label: 'Category Z', data: [25, 25, 25] }
                ];
            }

            return {
                clientName: clientName,
                clientGoal: `${clientName} intends to fully ${coreInitiative.action} ${timeline} in order to structurally improve their ${coreInitiative.metric}.`,
                situation_p1: `${clientName} is a deeply established organization operating within the global ${industry} space. ${background}`,
                situation_p2: `Recently, aggressive moves by emerging competitors and changing market dynamics have exposed these weaknesses. Operating margins are shrinking, and the board has mandated an immediate, structural change to their operating model to protect long-term viability.`,
                study: `The Board of Directors has engaged McKinsey to analyze the financial and operational feasibility of executing this ${coreInitiative.action}.`,
                
                // Question 1: Unified, 1-sentence prompt
                q1_prompt: `What specific operational and financial areas must the team investigate to thoroughly evaluate the feasibility of this proposed ${coreInitiative.action}?`,
                q1_answer: `<div class="space-y-4">
                                <p class="text-xs text-gray-500 mb-2">A top-tier candidate will instinctively build a MECE framework tailored specifically to the ${coreInitiative.action}, rather than relying on generic textbook structures.</p>
                                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    <div class="bg-slate-50 p-4 border border-gray-200 rounded">
                                        <p class="font-semibold text-[#005f9e] mb-1">1. Financial Viability</p>
                                        <ul class="list-disc pl-4 space-y-1 text-xs text-slate-700">
                                            <li>Upfront capital expenditure required.</li>
                                            <li>Projected impact on ${coreInitiative.metric}.</li>
                                        </ul>
