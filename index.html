<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite McKinsey Case Interview Architecture</title>
    <script src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
    <script src="[https://cdn.jsdelivr.net/npm/chart.js](https://cdn.jsdelivr.net/npm/chart.js)"></script>
    <link href="[https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap](https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap)" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        mckinsey: {
                            navy: '#051c2c',
                            blue: '#005f9e',
                            lightBg: '#f4f6f8',
                            slate: '#334155',
                            border: '#e2e8f0'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f6f8; }
        .reveal-content { max-height: 0; overflow: hidden; transition: max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1), padding 0.3s ease; }
        .reveal-content.open { max-height: 1500px; }
    </style>
</head>
<body class="text-gray-900 antialiased flex flex-col min-h-screen">

    <nav class="bg-[#051c2c] text-white py-4 px-6 border-b border-gray-800 shadow-sm">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="w-3 h-6 bg-[#005f9e]"></div>
                <span class="text-lg font-semibold tracking-wider uppercase text-gray-100">McKinsey Case Engine</span>
            </div>
            <span class="text-xs font-mono text-gray-400 bg-gray-900 px-3 py-1 rounded-full border border-gray-800">v2.1.0-Production</span>
        </div>
    </nav>

    <header class="max-w-6xl w-full mx-auto mt-8 px-4">
        <div class="bg-white p-6 rounded-lg border border-gray-200 shadow-sm">
            <h1 class="text-xl font-bold text-[#051c2c] mb-4">Case Scenario Configuration Matrix</h1>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-600 mb-2">Target Industry Vertical</label>
                    <select id="industry-select" class="w-full bg-gray-50 border border-gray-300 rounded-md p-2.5 text-sm font-medium text-gray-800 focus:ring-1 focus:ring-[#005f9e] focus:border-[#005f9e] outline-none">
                        <option value="Consumer Packaged Goods (CPG)">Consumer Packaged Goods (CPG)</option>
                        <option value="Public Sector & Government Strategy">Public Sector & Government Strategy</option>
                        <option value="Retail Banking & Wealth Management">Retail Banking & Wealth Management</option>
                        <option value="Investment Banking & Capital Markets">Investment Banking & Capital Markets</option>
                        <option value="Renewable Energy & Cleantech">Renewable Energy & Cleantech</option>
                        <option value="Oil & Gas Infrastructure">Oil & Gas Infrastructure</option>
                        <option value="Healthcare Delivery & Services">Healthcare Delivery & Services</option>
                        <option value="Pharmaceuticals & Biotechnology">Pharmaceuticals & Biotechnology</option>
                        <option value="SaaS & Enterprise Software">SaaS & Enterprise Software</option>
                        <option value="Hardware & Advanced Electronics Manufacturing">Hardware & Advanced Electronics Manufacturing</option>
                        <option value="Non-Profit & Global Philanthropy">Non-Profit & Global Philanthropy</option>
                        <option value="Telecommunications Infrastructure">Telecommunications Infrastructure</option>
                        <option value="Commercial Aviation & Airlines">Commercial Aviation & Airlines</option>
                        <option value="Global Logistics & Supply Chain">Global Logistics & Supply Chain</option>
                        <option value="Automotive OEM & Mobility Systems">Automotive OEM & Mobility Systems</option>
                        <option value="Agriculture & Agtech Markets">Agriculture & Agtech Markets</option>
                        <option value="Chemicals & Advanced Materials">Chemicals & Advanced Materials</option>
                        <option value="Commercial Real Estate Investment">Commercial Real Estate Investment</option>
                        <option value="Hospitality, Leisure & Gaming">Hospitality, Leisure & Gaming</option>
                        <option value="Media, Entertainment & Streaming Tech">Media, Entertainment & Streaming Tech</option>
                        <option value="Metals & Heavy Mining Operations">Metals & Heavy Mining Operations</option>
                        <option value="Aerospace & Defense Contractors">Aerospace & Defense Contractors</option>
                        <option value="E-Commerce Ecosystems & Direct-to-Consumer">E-Commerce Ecosystems & Direct-to-Consumer</option>
                        <option value="Insurance, Risk Systems & Underwriting">Insurance, Risk Systems & Underwriting</option>
                        <option value="Infrastructure, Construction & Smart Cities">Infrastructure, Construction & Smart Cities</option>
                        <option value="Water Utilities & Waste Management Systems">Water Utilities & Waste Management Systems</option>
                        <option value="Asset Management & Sovereign Wealth Funds">Asset Management & Sovereign Wealth Funds</option>
                        <option value="Forestry & Sustainable Paper Products">Forestry & Sustainable Paper Products</option>
                        <option value="Medical Devices & Surgical Robotics">Medical Devices & Surgical Robotics</option>
                        <option value="Professional Services & Talent Tech Platforms">Professional Services & Talent Tech Platforms</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-600 mb-2">Strategic Case Formulation</label>
                    <select id="type-select" class="w-full bg-gray-50 border border-gray-300 rounded-md p-2.5 text-sm font-medium text-gray-800 focus:ring-1 focus:ring-[#005f9e] focus:border-[#005f9e] outline-none">
                        <option value="Profitability / Operational Turnaround">Profitability / Operational Turnaround</option>
                        <option value="Market Entry Strategy">Market Entry Strategy</option>
                        <option value="M&A Commercial Target Diligence">M&A Commercial Target Diligence</option>
                        <option value="Pricing Architecture Optimization">Pricing Architecture Optimization</option>
                        <option value="Private Equity Value Creation / Operations">Private Equity Value Creation / Operations</option>
                        <option value="Digital Transformation & Core Enterprise Tech">Digital Transformation & Core Enterprise Tech</option>
                        <option value="Growth & Top-Line Revenue Optimization">Growth & Top-Line Revenue Optimization</option>
                        <option value="Organizational Restructuring & Design">Organizational Restructuring & Design</option>
                        <option value="Capital Capacity Expansion & Footprint">Capital Capacity Expansion & Footprint</option>
                        <option value="Supply Chain Optimization & Sourcing Architecture">Supply Chain Optimization & Sourcing Architecture</option>
                    </select>
                </div>
                <div class="flex items-end">
                    <button onclick="executeCaseGeneration()" class="w-full bg-[#005f9e] hover:bg-blue-800 text-white font-medium text-sm py-2.5 px-4 rounded-md shadow-sm transition duration-150 uppercase tracking-wider">
                        Initialize Case Model
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main id="workspace" class="max-w-6xl w-full mx-auto mt-8 px-4 mb-24 hidden">
        </main>

    <script>
        let operationalChart = null;

        function togglePanel(id) {
            const content = document.getElementById(id);
            const button = document.getElementById('btn-' + id);
            if (content.classList.contains('open')) {
                content.classList.remove('open');
                content.classList.add('border-none');
                button.innerHTML = 'Reveal Ideal Answer &bull; McKinsey Rubric &or;';
            } else {
                content.classList.add('open');
                content.classList.remove('border-none');
                button.innerHTML = 'Hide Solution Architecture &and;';
            }
        }

        function executeCaseGeneration() {
            const industry = document.getElementById('industry-select').value;
            const caseType = document.getElementById('type-select').value;
            const workspace = document.getElementById('workspace');
            
            workspace.classList.remove('hidden');
            
            // Simulates receiving a dynamic JSON payload from the backend route configuration
            const payload = simulateLLMOutputPayload(industry, caseType);
            
            workspace.innerHTML = `
                <div class="bg-white p-8 rounded-lg border border-gray-200 shadow-sm mb-6">
                    <div class="border-b border-gray-200 pb-4 mb-6">
                        <span class="text-xs font-bold uppercase tracking-widest text-[#005f9e]">${caseType}</span>
                        <h2 class="text-2xl font-bold text-[#051c2c] mt-1">${payload.title}</h2>
                    </div>
                    
                    <div class="space-y-6">
                        <div>
                            <h3 class="text-xs font-bold uppercase tracking-wider text-gray-500 mb-1">Client Goal</h3>
                            <p class="text-base font-medium text-gray-900">${payload.clientGoal}</p>
                        </div>
                        
                        <div>
                            <h3 class="text-xs font-bold uppercase tracking-wider text-gray-500 mb-1">Situation Description</h3>
                            <div class="text-sm text-gray-700 leading-relaxed space-y-4">${payload.situation}</div>
                        </div>
                        
                        <div>
                            <h3 class="text-xs font-bold uppercase tracking-wider text-gray-500 mb-1">McKinsey Study Directive</h3>
                            <p class="text-sm font-semibold text-[#051c2c] bg-slate-50 border-l-4 border-[#051c2c] p-3 italic">${payload.study}</p>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-lg border border-gray-200 shadow-sm mb-6 overflow-hidden">
                    <div class="p-8 border-b border-gray-100">
                        <div class="flex items-center space-x-2 text-xs font-bold uppercase tracking-wider text-gray-500 mb-2">
                            <span>Section 01</span><span>&bull;</span><span>Framework Architecture</span>
                        </div>
                        <h3 class="text-lg font-bold text-[#051c2c] mb-3">${payload.q1_prompt}</h3>
                    </div>
                    <div class="bg-gray-50 px-8 py-3 border-b border-gray-100">
                        <button id="btn-sec-1" onclick="togglePanel('sec-1')" class="text-xs font-bold uppercase tracking-wider text-[#005f9e] hover:text-blue-800 transition flex items-center">
                            Reveal Ideal Answer &bull; McKinsey Rubric &or;
                        </button>
                    </div>
                    <div id="sec-1" class="reveal-content bg-white px-8">
                        <div class="py-6 text-sm text-gray-700 border-t border-gray-100 leading-relaxed">${payload.q1_answer}</div>
                    </div>
                </div>

                <div class="bg-white rounded-lg border border-gray-200 shadow-sm mb-6 overflow-hidden">
                    <div class="p-8 border-b border-gray-100">
                        <div class="flex items-center space-x-2 text-xs font-bold uppercase tracking-wider text-gray-500 mb-2">
                            <span>Section 02</span><span>&bull;</span><span>Quantitative Analytics Matrix</span>
                        </div>
                        <h3 class="text-lg font-bold text-[#051c2c] mb-3">${payload.q2_prompt}</h3>
                    </div>
                    <div class="bg-gray-50 px-8 py-3 border-b border-gray-100">
                        <button id="btn-sec-2" onclick="togglePanel('sec-2')" class="text-xs font-bold uppercase tracking-wider text-[#005f9e] hover:text-blue-800 transition flex items-center">
                            Reveal Ideal Answer &bull; McKinsey Rubric &or;
                        </button>
                    </div>
                    <div id="sec-2" class="reveal-content bg-white px-8">
                        <div class="py-6 text-sm text-gray-700 border-t border-gray-100 leading-relaxed">${payload.q2_answer}</div>
                    </div>
                </div>

                <div class="bg-white rounded-lg border border-gray-200 shadow-sm mb-6 overflow-hidden">
                    <div class="p-8 border-b border-gray-100">
                        <div class="flex items-center space-x-2 text-xs font-bold uppercase tracking-wider text-gray-500 mb-2">
                            <span>Section 03</span><span>&bull;</span><span>Executive Data Interpretation</span>
                        </div>
                        <h3 class="text-lg font-bold text-[#051c2c] mb-4">${payload.q3_prompt}</h3>
                        
                        <div class="w-full bg-slate-50 p-6 rounded-lg border border-gray-200 shadow-inner flex items-center justify-center min-h-[380px]">
                            <div class="w-full max-w-[700px] h-full">
                                <canvas id="executiveExhibitCanvas"></canvas>
                            </div>
                        </div>
                    </div>
                    <div class="bg-gray-50 px-8 py-3 border-b border-gray-100">
                        <button id="btn-sec-3" onclick="togglePanel('sec-3')" class="text-xs font-bold uppercase tracking-wider text-[#005f9e] hover:text-blue-800 transition flex items-center">
                            Reveal Ideal Answer &bull; McKinsey Rubric &or;
                        </button>
                    </div>
                    <div id="sec-3" class="reveal-content bg-white px-8">
                        <div class="py-6 text-sm text-gray-700 border-t border-gray-100 leading-relaxed">${payload.q3_answer}</div>
                    </div>
                </div>

                <div class="bg-white rounded-lg border border-gray-200 shadow-sm mb-6 overflow-hidden">
                    <div class="p-8 border-b border-gray-100">
                        <div class="flex items-center space-x-2 text-xs font-bold uppercase tracking-wider text-gray-500 mb-2">
                            <span>Section 04</span><span>&bull;</span><span>Executive Synthesis Presentation</span>
                        </div>
                        <h3 class="text-lg font-bold text-[#051c2c] mb-3">${payload.recommendation_prompt}</h3>
                    </div>
                    <div class="bg-gray-50 px-8 py-3 border-b border-gray-100">
                        <button id="btn-sec-4" onclick="togglePanel('sec-4')" class="text-xs font-bold uppercase tracking-wider text-[#005f9e] hover:text-blue-800 transition flex items-center">
                            Reveal Ideal Answer &bull; McKinsey Rubric &or;
                        </button>
                    </div>
                    <div id="sec-4" class="reveal-content bg-white px-8">
                        <div class="py-6 text-sm text-gray-700 border-t border-gray-100 leading-relaxed">${payload.recommendation_answer}</div>
                    </div>
                </div>
            `;

            renderExecutiveChart(payload.chartType, payload.chartConfig);
        }

        function renderExecutiveChart(type, config) {
            const ctx = document.getElementById('executiveExhibitCanvas').getContext('2d');
            if (operationalChart) { operationalChart.destroy(); }

            let chartJsConfig = {
                plugins: [{
                    beforeDraw: (chart) => {
                        const ctx = chart.ctx;
                        ctx.save();
                        ctx.fillStyle = '#f8fafc';
                        ctx.fillRect(0, 0, chart.width, chart.height);
                        ctx.restore();
                    }
                }],
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        title: {
                            display: true,
                            text: config.title,
                            color: '#051c2c',
                            font: { family: 'Inter', size: 14, weight: '700' },
                            padding: { bottom: 20 }
                        },
                        legend: {
                            display: ['bubble', 'dualAxis', 'stackedBar100', 'groupedBar', 'mixed'].includes(type),
                            labels: { font: { family: 'Inter', size: 11, weight: '500' }, color: '#334155' }
                        }
                    }
                }
            };

            // Programmatic Mapping of the 15 Executive Chart Archetypes
            switch(type) {
                case 'bubble':
                    chartJsConfig.type = 'bubble';
                    chartJsConfig.data = {
                        datasets: config.datasets.map((ds, idx) => ({
                            label: ds.label,
                            data: ds.data, // Expects [{x, y, r}]
                            backgroundColor: idx === 0 ? 'rgba(0, 95, 158, 0.7)' : 'rgba(51, 65, 85, 0.6)'
                        }))
                    };
                    chartJsConfig.options.scales = {
                        x: { title: { display: true, text: 'Market Attractiveness index', font: { weight: '600' } } },
                        y: { title: { display: true, text: 'Relative Competitive Position', font: { weight: '600' } } }
                    };
                    break;

                case 'inverted':
                    chartJsConfig.type = 'line';
                    chartJsConfig.data = {
                        labels: config.labels,
                        datasets: [{
                            label: config.datasets[0].label,
                            data: config.datasets[0].data,
                            borderColor: '#005f9e',
                            backgroundColor: 'rgba(0, 95, 158, 0.05)',
                            fill: true,
                            tension: 0.1
                        }]
                    };
                    chartJsConfig.options.scales = {
                        y: { reverse: true, title: { display: true, text: 'Cost Rank Depth / Operational Margin Risk (Inverted Target Baseline)', font: { weight: '600' } } }
                    };
                    break;

                case 'waterfall':
                    chartJsConfig.type = 'bar';
                    chartJsConfig.data = {
                        labels: config.labels,
                        datasets: [{
                            label: config.datasets[0].label,
                            data: config.datasets[0].data, // Expects floating arrays [start, end]
                            backgroundColor: config.labels.map((_, i) => i === 0 || i === config.labels.length - 1 ? '#051c2c' : '#005f9e')
                        }]
                    };
                    chartJsConfig.options.scales = {
                        y: { title: { display: true, text: 'Value Reconciled ($M)', font: { weight: '600' } } }
                    };
                    break;

                case 'dualAxis':
                    chartJsConfig.type = 'bar';
                    chartJsConfig.data = {
                        labels: config.labels,
                        datasets: [
                            { type: 'bar', label: config.datasets[0].label, data: config.datasets[0].data, backgroundColor: '#005f9e', yAxisID: 'y' },
                            { type: 'line', label: 'Variance Margin %', data: config.datasets[0].extraData, borderColor: '#d9534f', yAxisID: 'y1', borderWidth: 3, fill: false }
                        ]
                    };
                    chartJsConfig.options.scales = {
                        y: { type: 'linear', position: 'left', title: { display: true, text: 'Absolute Output ($M)' } },
                        y1: { type: 'linear', position: 'right', grid: { drawOnChartArea: false }, title: { display: true, text: 'Percentage Scale (%)' } }
                    };
                    break;

                case 'stackedBar100':
                    chartJsConfig.type = 'bar';
                    chartJsConfig.data = {
                        labels: config.labels,
                        datasets: config.datasets.map((ds, idx) => ({
                            label: ds.label,
                            data: ds.data,
                            backgroundColor: idx === 0 ? '#051c2c' : idx === 1 ? '#005f9e' : '#94a3b8'
                        }))
                    };
                    chartJsConfig.options.scales = {
                        x: { stacked: true },
                        y: { stacked: true, max: 100, title: { display: true, text: 'Total Profile Split (%)' } }
                    };
                    break;

                case 'radar':
                    chartJsConfig.type = 'radar';
                    chartJsConfig.data = {
                        labels: config.labels,
                        datasets: config.datasets.map(ds => ({
                            label: ds.label,
                            data: ds.data,
                            borderColor: '#005f9e',
                            backgroundColor: 'rgba(0, 95, 158, 0.2)'
                        }))
                    };
                    break;

                case 'scatter':
                    chartJsConfig.type = 'scatter';
                    chartJsConfig.data = {
                        datasets: [{
                            label: config.datasets[0].label,
                            data: config.datasets[0].data, // Expects [{x, y}]
                            backgroundColor: '#051c2c'
                        }]
                    };
                    break;

                case 'stepline':
                    chartJsConfig.type = 'line';
                    chartJsConfig.data = {
                        labels: config.labels,
                        datasets: [{
                            label: config.datasets[0].label,
                            data: config.datasets[0].data,
                            stepped: true,
                            borderColor: '#005f9e',
                            fill: false
                        }]
                    };
                    break;

                case 'polarArea':
                    chartJsConfig.type = 'polarArea';
                    chartJsConfig.data = {
                        labels: config.labels,
                        datasets: [{
                            data: config.datasets[0].data,
                            backgroundColor: ['#051c2c', '#005f9e', '#475569', '#94a3b8', '#cbd5e1']
                        }]
                    };
                    break;

                case 'doughnut':
                    chartJsConfig.type = 'doughnut';
                    chartJsConfig.data = {
                        labels: config.labels,
                        datasets: [{
                            data: config.datasets[0].data,
                            backgroundColor: ['#051c2c', '#005f9e', '#64748b', '#cbd5e1']
                        }]
                    };
                    break;

                case 'line':
                    chartJsConfig.type = 'line';
                    chartJsConfig.data = {
                        labels: config.labels,
                        datasets: [{
                            label: config.datasets[0].label,
                            data: config.datasets[0].data,
                            borderColor: '#051c2c',
                            borderWidth: 2,
                            fill: false
                        }]
                    };
                    break;

                case 'bar':
                    chartJsConfig.type = 'bar';
                    chartJsConfig.data = {
                        labels: config.labels,
                        datasets: [{
                            label: config.datasets[0].label,
                            data: config.datasets[0].data,
                            backgroundColor: '#005f9e'
                        }]
                    };
                    break;

                case 'groupedBar':
                    chartJsConfig.type = 'bar';
                    chartJsConfig.data = {
                        labels: config.labels,
                        datasets: [
                            { label: 'Baseline', data: config.datasets[0].data, backgroundColor: '#475569' },
                            { label: 'Target Model', data: config.datasets[0].extraData, backgroundColor: '#005f9e' }
                        ]
                    };
                    break;

                case 'mixed':
                    chartJsConfig.type = 'bar';
                    chartJsConfig.data = {
                        labels: config.labels,
                        datasets: [
                            { type: 'bar', label: 'Direct CapEx Allocation', data: config.datasets[0].data, backgroundColor: '#051c2c' },
                            { type: 'line', label: 'EBITDA Runrate Trend', data: config.datasets[0].extraData, borderColor: '#005f9e', fill: false }
                        ]
                    };
                    break;

                case 'area':
                    chartJsConfig.type = 'line';
                    chartJsConfig.data = {
                        labels: config.labels,
                        datasets: [{
                            label: config.datasets[0].label,
                            data: config.datasets[0].data,
                            backgroundColor: 'rgba(5, 28, 44, 0.15)',
                            borderColor: '#051c2c',
                            fill: true
                        }]
                    };
                    break;
            }

            operationalChart = new Chart(ctx, chartJsConfig);
        }

        // Programmatic local generation engine serving as the system's dynamic data provider
        function simulateLLMOutputPayload(industry, type) {
            const chartStyles = ['bubble', 'inverted', 'waterfall', 'dualAxis', 'stackedBar100', 'radar', 'scatter', 'stepline', 'polarArea', 'doughnut', 'line', 'bar', 'groupedBar', 'mixed', 'area'];
            const assignedChartType = chartStyles[Math.floor(Math.random() * chartStyles.length)];
            
            let simulatedConfig = {
                title: `Exhibit Variant: Macro Analytical Operational Optimization Analysis`,
                labels: ['FY23 Baseline', 'Segment Alpha Adjustments', 'Segment Beta Variations', 'Global Core Execution Runrate', 'FY27 Target'],
                datasets: [{ label: 'Strategic Core Metric Variance Tracking Pool', data: [120, 180, 95, 240, 310], extraData: [15, 30, 45, 60, 85] }]
            };

            if (assignedChartType === 'waterfall') {
                simulatedConfig.datasets[0].data = [[0, 500], [500, 680], [600, 680], [600, 750], [0, 750]];
            } else if (assignedChartType === 'bubble') {
                simulatedConfig.datasets = [
                    { label: 'Core Portfolio Matrix A', data: [{ x: 25, y: 40, r: 15 }, { x: 45, y: 80, r: 25 }, { x: 75, y: 65, r: 30 }] },
                    { label: 'Core Portfolio Matrix B', data: [{ x: 15, y: 20, r: 10 }, { x: 60, y: 35, r: 18 }, { x: 85, y: 90, r: 22 }] }
                ];
            } else if (assignedChartType === 'scatter') {
                simulatedConfig.datasets[0].data = [{ x: 10, y: 20 }, { x: 15, y: 35 }, { x: 25, y: 45 }, { x: 40, y: 60 }, { x: 65, y: 80 }];
            } else if (assignedChartType === 'stackedBar100') {
                simulatedConfig.labels = ['Region Americas', 'Region EMEA', 'Region APAC'];
                simulatedConfig.datasets = [
                    { label: 'Segment Fixed Overhead Cost Profile', data: [40, 50, 30] },
                    { label: 'Segment Variable Optimization Core Pool', data: [35, 25, 45] },
                    { label: 'Segment Pure Operating Margin Pool', data: [25, 25, 25] }
                ];
            }

            return {
                title: `${industry}: ${type} Case Scenario Assessment Matrix`,
                clientGoal: `Our client is an international market leader specializing in ${industry} operations, targeting immediate optimization within their core competitive execution sectors.`,
                situation: `<p>The client is navigating major changes in their structural markets, caused by shifts in regulatory rules, volatile production networks, and changing customer preferences. These conditions have slowed their growth to 1.4% annually, below the historical average for their sector.</p>
                            <p>Operational complexity has increased costs significantly. The client's management team wants to understand their baseline cost drivers, figure out why margins are narrowing, and evaluate whether a major digital restructure is viable.</p>
                            <p>To reverse this trend, leadership is looking at strategic options that require a clear view of their competitive realities, fixed asset investments, and long-term cost profiles.</p>`,
                study: `The client has asked McKinsey to find the root causes of their margin pressure and create a comprehensive blueprint to improve profitability.`,
                q1_prompt: `What key structural and environmental elements should the McKinsey engagement team analyze to build a mutually exclusive, collectively exhaustive (MECE) diagnostic framework for this operation?`,
                q1_answer: `<p><strong>Ideal McKinsey Structuring Response Matrix (MECE Design Target):</strong></p>
                            <ul class="list-disc pl-5 space-y-2 mt-2">
