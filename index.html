    <script>
        let globalChartInstance = null;

        function toggleAnswerContainer(id) {
            const content = document.getElementById(id);
            const button = document.getElementById('btn-' + id);
            const indicator = document.getElementById('ind-' + id);
            
            if (content.classList.contains('open')) {
                content.classList.remove('open');
                button.classList.remove('bg-slate-100', 'text-[#051c2c]');
                button.classList.add('bg-white', 'text-[#005f9e]');
                indicator.innerHTML = '&#9662;';
            } else {
                content.classList.add('open');
                button.classList.remove('bg-white', 'text-[#005f9e]');
                button.classList.add('bg-slate-100', 'text-[#051c2c]');
                indicator.innerHTML = '&#9652;';
            }
        }

        function executeCaseGenerationEngine() {

            const caseType = document.getElementById('type-select').value;
            const workspace = document.getElementById('workspace');
            
            workspace.classList.remove('hidden');
            const generatedCaseData = parseCaseEngineLogic(industry, caseType);
            
            workspace.innerHTML = `
                <!-- STRATEGIC BRIEFING OVERVIEW -->

                        <h2 class="text-2xl font-bold tracking-tight">${generatedCaseData.title}</h2>
                    </div>
                    <div class="p-8 space-y-6">
                        <div>
                            <h3 class="text-xs font-bold uppercase tracking-wider text-slate-500 mb-1">Client Goal</h3>
                            <p class="text-base font-semibold text-gray-900">${generatedCaseData.clientGoal}</p>
                        </div>
                        <hr class="border-gray-100" />
                        <div>
                            <h3 class="text-xs font-bold uppercase tracking-wider text-slate-500 mb-2">Situation Description</h3>
                            <div class="text-sm text-gray-700 leading-relaxed space-y-4">${generatedCaseData.situation}</div>
                        </div>
                        <hr class="border-gray-100" />
                        <div>
                            <h3 class="text-xs font-bold uppercase tracking-wider text-slate-500 mb-2">McKinsey Study Directive</h3>
                            <div class="bg-slate-50 border-l-4 border-[#051c2c] p-4 text-sm font-medium text-[#051c2c] italic rounded-r">
                                ${generatedCaseData.study}
                            </div>
                        </div>
                    </div>
                </div>

                <!-- QUESTION 1 SECTION -->
                <div class="bg-white rounded-lg border border-gray-200 shadow-sm mb-8 overflow-hidden">
                    <div class="p-6 border-b border-gray-100 bg-slate-50/50 flex justify-between items-center">
                        <span class="text-xs font-bold uppercase tracking-wider text-slate-500">Formulation Element // Question 1</span>
                        <span class="text-xs font-mono text-gray-400">Qualitative Focus</span>
                    </div>
                    <div class="p-8">
                        <h3 class="text-lg font-bold text-[#051c2c] mb-6">${generatedCaseData.q1_prompt}</h3>
                        <button id="btn-ans-1" onclick="toggleAnswerContainer('ans-1')" class="w-full flex justify-between items-center border border-gray-200 rounded p-4 text-sm font-semibold text-[#005f9e] hover:bg-slate-50 transition bg-white shadow-sm">
                            <span>Reveal Ideal Answer &bull; McKinsey Structural Rubric</span>
                            <span id="ind-ans-1" class="text-xs font-mono">&#9662;</span>
                        </button>
                        <div id="ans-1" class="reveal-content bg-white">
                            <div class="p-6 mt-4 border border-gray-100 bg-slate-50/40 rounded text-sm text-gray-700 leading-relaxed">${generatedCaseData.q1_answer}</div>
                        </div>
                    </div>
                </div>

                <!-- QUESTION 2 SECTION -->
                <div class="bg-white rounded-lg border border-gray-200 shadow-sm mb-8 overflow-hidden">
                    <div class="p-6 border-b border-gray-100 bg-slate-50/50 flex justify-between items-center">
                        <span class="text-xs font-bold uppercase tracking-wider text-slate-500">Formulation Element // Question 2</span>
                        <span class="text-xs font-mono text-gray-400">Numerical Core</span>
                    </div>
                    <div class="p-8">
                        <h3 class="text-lg font-bold text-[#051c2c] mb-6">${generatedCaseData.q2_prompt}</h3>
                        <button id="btn-ans-2" onclick="toggleAnswerContainer('ans-2')" class="w-full flex justify-between items-center border border-gray-200 rounded p-4 text-sm font-semibold text-[#005f9e] hover:bg-slate-50 transition bg-white shadow-sm">
                            <span>Reveal Ideal Answer &bull; Calculation Chain</span>
                            <span id="ind-ans-2" class="text-xs font-mono">&#9662;</span>
                        </button>
                        <div id="ans-2" class="reveal-content bg-white">
                            <div class="p-6 mt-4 border border-gray-100 bg-slate-50/40 rounded text-sm text-gray-700 leading-relaxed">${generatedCaseData.q2_answer}</div>
                        </div>
                    </div>
                </div>

                <!-- QUESTION 3 SECTION -->
                <div class="bg-white rounded-lg border border-gray-200 shadow-sm mb-8 overflow-hidden">
                    <div class="p-6 border-b border-gray-100 bg-slate-50/50 flex justify-between items-center">
                        <span class="text-xs font-bold uppercase tracking-wider text-slate-500">Formulation Element // Question 3</span>
                        <span class="text-xs font-mono text-gray-400">Chart Interface</span>
                    </div>
                    <div class="p-8">
                        <h3 class="text-lg font-bold text-[#051c2c] mb-6">${generatedCaseData.q3_prompt}</h3>
                        <div class="w-full bg-white p-4 rounded border border-gray-200 shadow-inner flex items-center justify-center min-h-[400px] mb-6 relative">
                            <div class="w-full h-[360px] relative">

                            </div>
                        </div>
                        <button id="btn-ans-3" onclick="toggleAnswerContainer('ans-3')" class="w-full flex justify-between items-center border border-gray-200 rounded p-4 text-sm font-semibold text-[#005f9e] hover:bg-slate-50 transition bg-white shadow-sm">
                            <span>Reveal Ideal Answer &bull; Data Interpretation Framework</span>
                            <span id="ind-ans-3" class="text-xs font-mono">&#9662;</span>
                        </button>
                        <div id="ans-3" class="reveal-content bg-white">
                            <div class="p-6 mt-4 border border-gray-100 bg-slate-50/40 rounded text-sm text-gray-700 leading-relaxed">${generatedCaseData.q3_answer}</div>
                        </div>
                    </div>
                </div>

                <!-- QUESTION 4 SECTION -->
                <div class="bg-white rounded-lg border border-gray-200 shadow-sm mb-8 overflow-hidden">
                    <div class="p-6 border-b border-gray-100 bg-slate-50/50 flex justify-between items-center">
                        <span class="text-xs font-bold uppercase tracking-wider text-slate-500">Formulation Element // Question 4</span>
                        <span class="text-xs font-mono text-gray-400">Synthesis Rubric</span>
                    </div>
                    <div class="p-8">
                        <h3 class="text-lg font-bold text-[#051c2c] mb-6">${generatedCaseData.recommendation_prompt}</h3>
                        <button id="btn-ans-4" onclick="toggleAnswerContainer('ans-4')" class="w-full flex justify-between items-center border border-gray-200 rounded p-4 text-sm font-semibold text-[#005f9e] hover:bg-slate-50 transition bg-white shadow-sm">
                            <span>Reveal Ideal Answer &bull; Strategic Expansion Strategy</span>
                            <span id="ind-ans-4" class="text-xs font-mono">&#9662;</span>
                        </button>
                        <div id="ans-4" class="reveal-content bg-white">
                            <div class="p-6 mt-4 border border-gray-100 bg-slate-50/40 rounded text-sm text-gray-700 leading-relaxed">${generatedCaseData.recommendation_answer}</div>

            `;

            executeChartEngineAllocation(generatedCaseData.chartType, generatedCaseData.chartConfig);
            workspace.scrollIntoView({ behavior: 'smooth' });
        }

        function executeChartEngineAllocation(type, config) {
            const canvas = document.getElementById('canvasRenderZone');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            if (globalChartInstance) { globalChartInstance.destroy(); }

            let chartJsConfig = {
                plugins: [{
                    beforeDraw: (chart) => {
                        const cCtx = chart.ctx;
                        cCtx.save();
                        cCtx.fillStyle = '#ffffff';
                        cCtx.fillRect(0, 0, chart.width, chart.height);
                        cCtx.restore();
                    }
                }],
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        title: {
                            display: true,
                            text: config.title,
                            color: '#051c2c',
                            font: { family: 'Inter', size: 14, weight: '700' },
                            padding: { bottom: 15 }
                        },
                        legend: {
                            display: ['bubble', 'dualAxis', 'stackedBar100', 'groupedBar', 'mixed'].includes(type),
                            labels: { font: { family: 'Inter', size: 11, weight: '500' }, color: '#334155' }
                        }
                    }
                }
            };

            switch(type) {
                case 'bubble':
                    chartJsConfig.type = 'bubble';
                    chartJsConfig.data = {
                        datasets: config.datasets.map((ds, i) => ({
                            label: ds.label,
                            data: ds.data,
                            backgroundColor: i === 0 ? 'rgba(0, 95, 158, 0.75)' : 'rgba(51, 65, 85, 0.65)'
                        }))
                    };
                    chartJsConfig.options.scales = {
                        x: { title: { display: true, text: 'Market Attractiveness Index (0-100)', font: { weight: '600' } } },
                        y: { title: { display: true, text: 'Relative Competitive Position (0-100)', font: { weight: '600' } } }
                    };
                    break;

                case 'inverted':
                    chartJsConfig.type = 'line';
                    chartJsConfig.data = {
                        labels: config.labels,
                        datasets: [{
                            label: config.datasets[0].label,
                            data: config.datasets[0].data,
                            borderColor: '#005f9e',
                            backgroundColor: 'rgba(0, 95, 158, 0.05)',
                            fill: true,
                            tension: 0.1
                        }]
                    };
                    chartJsConfig.options.scales = {
                        y: { reverse: true, title: { display: true, text: 'Operational Cost Depth Rank (Inverted)', font: { weight: '600' } } }
                    };
                    break;

                case 'waterfall':
                    chartJsConfig.type = 'bar';
                    chartJsConfig.data = {
                        labels: config.labels,
                        datasets: [{
                            label: config.datasets[0].label,
                            data: config.datasets[0].data,
                            backgroundColor: config.labels.map((_, i) => i === 0 || i === config.labels.length - 1 ? '#051c2c' : '#005f9e')
                        }]
                    };
                    break;

                case 'dualAxis':
                    chartJsConfig.type = 'bar';
                    chartJsConfig.data = {
                        labels: config.labels,
                        datasets: [
                            { type: 'bar', label: config.datasets[0].label, data: config.datasets[0].data, backgroundColor: '#005f9e', yAxisID: 'y' },
                            { type: 'line', label: 'EBITDA Contribution Margin %', data: config.datasets[0].extraData, borderColor: '#e06b20', yAxisID: 'y1', borderWidth: 3, fill: false }
                        ]
                    };
                    chartJsConfig.options.scales = {
                        y: { type: 'linear', position: 'left', title: { display: true, text: 'Absolute Metric Value ($M)' } },
                        y1: { type: 'linear', position: 'right', grid: { drawOnChartArea: false }, title: { display: true, text: 'Percentage Scale (%)' } }
                    };
                    break;

                case 'stackedBar100':
                    chartJsConfig.type = 'bar';
                    chartJsConfig.data = {
                        labels: config.labels,
                        datasets: config.datasets.map((ds, idx) => ({
                            label: ds.label,
                            data: ds.data,
                            backgroundColor: idx === 0 ? '#051c2c' : idx === 1 ? '#005f9e' : '#94a3b8'
                        }))
                    };
                    chartJsConfig.options.scales = {
                        x: { stacked: true },
                        y: { stacked: true, max: 100, title: { display: true, text: 'Percentage Split (%)' } }
                    };
                    break;

                case 'radar':
                    chartJsConfig.type = 'radar';
                    chartJsConfig.data = {
                        labels: config.labels,
                        datasets: config.datasets.map(ds => ({
                            label: ds.label,
                            data: ds.data,
                            borderColor: '#005f9e',
                            backgroundColor: 'rgba(0, 95, 158, 0.2)'
                        }))
                    };
                    break;

                case 'scatter':
                    chartJsConfig.type = 'scatter';
                    chartJsConfig.data = {
                        datasets: [{
                            label: config.datasets[0].label,
                            data: config.datasets[0].data,
                            backgroundColor: '#051c2c'
                        }]
                    };
                    break;

                case 'stepline':
                    chartJsConfig.type = 'line';
                    chartJsConfig.data = {
                        labels: config.labels,
                        datasets: [{
                            label: config.datasets[0].label,
                            data: config.datasets[0].data,
                            stepped: true,
                            borderColor: '#005f9e',
                            fill: false
                        }]
                    };
                    break;

                case 'polarArea':
                    chartJsConfig.type = 'polarArea';
                    chartJsConfig.data = {
                        labels: config.labels,
                        datasets: [{
                            data: config.datasets[0].data,
                            backgroundColor: ['#051c2c', '#005f9e', '#475569', '#94a3b8', '#cbd5e1']
                        }]
                    };
                    break;

                case 'doughnut':
                    chartJsConfig.type = 'doughnut';
                    chartJsConfig.data = {
                        labels: config.labels,
                        datasets: [{
                            data: config.datasets[0].data,
                            backgroundColor: ['#051c2c', '#005f9e', '#64748b', '#cbd5e1']
                        }]
                    };
                    break;

                case 'line':
                    chartJsConfig.type = 'line';
                    chartJsConfig.data = {
                        labels: config.labels,
                        datasets: [{
                            label: config.datasets[0].label,
                            data: config.datasets[0].data,
                            borderColor: '#051c2c',
                            borderWidth: 2,
                            fill: false
                        }]
                    };
                    break;

                case 'bar':
                    chartJsConfig.type = 'bar';
                    chartJsConfig.data = {
                        labels: config.labels,
                        datasets: [{
                            label: config.datasets[0].label,
                            data: config.datasets[0].data,
                            backgroundColor: '#005f9e'
                        }]
                    };
                    break;

                case 'groupedBar':
                    chartJsConfig.type = 'bar';
                    chartJsConfig.data = {
                        labels: config.labels,
                        datasets: [
                            { label: 'Historical Baseline Status', data: config.datasets[0].data, backgroundColor: '#475569' },
                            { label: 'Optimized Target State Model', data: config.datasets[0].extraData, backgroundColor: '#005f9e' }
                        ]
                    };
                    break;

                case 'mixed':
                    chartJsConfig.type = 'bar';
                    chartJsConfig.data = {
                        labels: config.labels,
                        datasets: [
                            { type: 'bar', label: 'CapEx Baseline Allocation', data: config.datasets[0].data, backgroundColor: '#051c2c' },
                            { type: 'line', label: 'Target Margin Scale Runrate', data: config.datasets[0].extraData, borderColor: '#005f9e', fill: false }
                        ]
                    };
                    break;

                case 'area':
                    chartJsConfig.type = 'line';
                    chartJsConfig.data = {
                        labels: config.labels,
                        datasets: [{
                            label: config.datasets[0].label,
                            data: config.datasets[0].data,
                            backgroundColor: 'rgba(5, 28, 44, 0.12)',
                            borderColor: '#051c2c',
                            fill: true
                        }]
                    };
                    break;
            }

            globalChartInstance = new Chart(ctx, chartJsConfig);
        }

        function parseCaseEngineLogic(industry, type) {
            // Context Pools for Procedural Generation Matrix
            const fakeCompanies = [
                "AeroNova Solutions", "Zenith Biologics", "VeloFoods Global", "Horizon Sovereign Fund", 
                "Vanguard Agritech", "Apex Retail Partners", "Luxis Premium Cosmetics", "Integra Health Systems", 
                "Solari Power Infrastructure", "TelcoLink International", "NovaStream Entertainment", 
                "Stera Advanced Materials", "OmniChannel Logistics", "CoreQuantum Analytics"
            ];
            const corporateName = fakeCompanies[Math.floor(Math.random() * fakeCompanies.length)];

            const dynamicIssues = [
                "is experiencing structural changes due to intense near-shore competition and shifting global trade rules.",
                "has seen operational margin compression as legacy technology costs outpace digital adoption lines.",
                "is navigating regulatory overhead disruptions alongside a cooling domestic capital deployment market.",
                "needs to assess their core footprint asset strategy as capital returns slide lower.",
                "is facing new distribution network demands that challenge their traditional asset layouts."
            ];
            const issueParagraph = dynamicIssues[Math.floor(Math.random() * dynamicIssues.length)];

            // Mathematical Parameter Formulation
            const baseFixedCost = (Math.floor(Math.random() * 4) + 2) * 20; // 40M, 60M, 80M, 100M
            const globalVolumeBase = Math.floor(Math.random() * 5) + 8; // 8M to 12M units
            const wholesalePrice = (Math.random() * 50 + 40).toFixed(2); // $40 to $90
            const variableOverheadCost = (wholesalePrice * 0.65).toFixed(2); // 65% of wholesale price
            const unitMargin = (wholesalePrice - variableOverheadCost).toFixed(2);
            
            const breakEvenUnits = Math.round((baseFixedCost * 1000000) / unitMargin);
            const totalRevenueAtVolume = (globalVolumeBase * 1000000 * wholesalePrice);
            const totalVariableAtVolume = (globalVolumeBase * 1000000 * variableOverheadCost);
            const explicitEbitdaResult = (totalRevenueAtVolume - totalVariableAtVolume - (baseFixedCost * 1000000));

            const chartPool = ['bubble', 'inverted', 'waterfall', 'dualAxis', 'stackedBar100', 'radar', 'scatter', 'stepline', 'polarArea', 'doughnut', 'line', 'bar', 'groupedBar', 'mixed', 'area'];
            const targetedChartType = chartPool[Math.floor(Math.random() * chartPool.length)];

            // Setup dynamic chart configurations
