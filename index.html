<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>McKinsey Style Case Bot</title>
    <!-- Tailwind CSS Engine -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js Engine -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Premium Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        mckinsey: {
                            navy: '#051c2c',
                            blue: '#005f9e',
                            lightBg: '#f4f6f8',
                            slate: '#334155',
                            accent: '#e06b20'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f6f8; }
        .reveal-content { max-height: 0; overflow: hidden; transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .reveal-content.open { max-height: 2500px; }
    </style>
</head>
<body class="text-gray-900 antialiased flex flex-col min-h-screen bg-[#f4f6f8]">

    <!-- Global Executive Header -->
    <nav class="bg-[#051c2c] text-white py-4 px-6 border-b border-gray-800 shadow-md sticky top-0 z-50">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="w-3 h-6 bg-[#005f9e]"></div>
                <span class="text-sm font-bold uppercase tracking-widest text-gray-100">McKinsey Style Case Bot</span>
            </div>
            <span class="text-xs font-mono text-[#005f9e] bg-slate-900/80 px-3 py-1 rounded border border-slate-800 font-semibold">AI Deployment Environment</span>
        </div>

    <!-- Configuration Control Matrix -->
    <header class="max-w-5xl w-full mx-auto mt-8 px-4">

            <h1 class="text-lg font-bold text-[#051c2c] mb-4 flex items-center">

                Case Strategy Parameters
            </h1>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-gray-600 mb-2">Target Industry Vertical</label>
                    <select id="industry-select" class="w-full bg-white border border-gray-300 rounded p-2.5 text-sm font-medium text-gray-800 focus:ring-1 focus:ring-[#005f9e] focus:border-[#005f9e] outline-none cursor-pointer">
                        <option value="Consumer Packaged Goods (CPG)">Consumer Packaged Goods (CPG)</option>
                        <option value="Public Sector & Government Strategy">Public Sector & Government Strategy</option>
                        <option value="Retail Banking & Wealth Management">Retail Banking & Wealth Management</option>
                        <option value="Investment Banking & Capital Markets">Investment Banking & Capital Markets</option>
                        <option value="Renewable Energy & Cleantech">Renewable Energy & Cleantech</option>
                        <option value="Oil & Gas Infrastructure">Oil & Gas Infrastructure</option>
                        <option value="Healthcare Delivery & Hospital Systems">Healthcare Delivery & Hospital Systems</option>
                        <option value="Pharmaceuticals & Biotechnology">Pharmaceuticals & Biotechnology</option>
                        <option value="SaaS & Enterprise Software">SaaS & Enterprise Software</option>
                        <option value="Hardware Manufacturing">Hardware Manufacturing</option>
                        <option value="Non-Profit & Global Philanthropy">Non-Profit & Global Philanthropy</option>
                        <option value="Telecommunications Networks">Telecommunications Networks</option>
                        <option value="Commercial Aviation & Airlines">Commercial Aviation & Airlines</option>
                        <option value="Global Logistics & Supply Chain">Global Logistics & Supply Chain</option>
                        <option value="Automotive OEM & Mobility Systems">Automotive OEM & Mobility Systems</option>
                        <option value="Agriculture & Agtech Markets">Agriculture & Agtech Markets</option>
                        <option value="Chemicals & Advanced Materials">Chemicals & Advanced Materials</option>
                        <option value="Commercial Real Estate Investment">Commercial Real Estate Investment</option>
                        <option value="Hospitality, Leisure & Gaming">Hospitality, Leisure & Gaming</option>
                        <option value="Media, Entertainment & Streaming Tech">Media, Entertainment & Streaming Tech</option>
                        <option value="Metals & Heavy Mining Operations">Metals & Heavy Mining Operations</option>
                        <option value="Aerospace & Defense Contractors">Aerospace & Defense Contractors</option>
                        <option value="E-Commerce Platforms & Direct-to-Consumer">E-Commerce Platforms & Direct-to-Consumer</option>
                        <option value="Insurance & Risk Underwriting">Insurance & Risk Under underwriting</option>
                        <option value="Infrastructure, Construction & Smart Cities">Infrastructure, Construction & Smart Cities</option>
                        <option value="Water Utilities & Waste Systems">Water Utilities & Waste Systems</option>
                        <option value="Asset Management & Sovereign Wealth Funds">Asset Management & Sovereign Wealth Funds</option>
                        <option value="Forestry & Sustainable Paper Products">Forestry & Sustainable Paper Products</option>
                        <option value="Medical Devices & Surgical Robotics">Medical Devices & Surgical Robotics</option>
                        <option value="Professional Services & Talent Tech">Professional Services & Talent Tech</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-gray-600 mb-2">Strategic Case Type</label>
                    <select id="type-select" class="w-full bg-white border border-gray-300 rounded p-2.5 text-sm font-medium text-gray-800 focus:ring-1 focus:ring-[#005f9e] focus:border-[#005f9e] outline-none cursor-pointer">
                        <option value="Profitability / Operational Turnaround">Profitability / Operational Turnaround</option>
                        <option value="Market Entry Strategy">Market Entry Strategy</option>
                        <option value="M&A Commercial Target Diligence">M&A Commercial Target Diligence</option>
                        <option value="Pricing Architecture Optimization">Pricing Architecture Optimization</option>
                        <option value="Private Equity Value Creation">Private Equity Value Creation</option>
                        <option value="Digital Transformation & Core Enterprise Tech">Digital Transformation & Core Enterprise Tech</option>
                        <option value="Growth & Top-Line Revenue Optimization">Growth & Top-Line Revenue Optimization</option>
                        <option value="Organizational Restructuring & Design">Organizational Restructuring & Design</option>
                        <option value="Capital Capacity Expansion & Footprint">Capital Capacity Expansion & Footprint</option>
                        <option value="Supply Chain Optimization & Sourcing">Supply Chain Optimization & Sourcing</option>
                    </select>
                </div>
                <div class="flex items-end">
                    <button onclick="executeCaseGenerationEngine()" class="w-full bg-[#005f9e] hover:bg-blue-800 text-white font-semibold text-xs py-3 px-4 rounded shadow-sm transition duration-150 uppercase tracking-widest">
                        Generate Custom Case Model
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Workspace Container -->
    <main id="workspace" class="max-w-5xl w-full mx-auto mt-8 px-4 mb-24 hidden">
        <!-- Injected Dynamically by JavaScript -->
    </main>

    <script>
        let globalChartInstance = null;

        function toggleAnswerContainer(id) {
            const content = document.getElementById(id);
            const button = document.getElementById('btn-' + id);
            const indicator = document.getElementById('ind-' + id);
            
            if (content.classList.contains('open')) {
                content.classList.remove('open');
                button.classList.remove('bg-slate-100', 'text-[#051c2c]');
                button.classList.add('bg-white', 'text-[#005f9e]');
                indicator.innerHTML = '&#9662;';
            } else {
                content.classList.add('open');
                button.classList.remove('bg-white', 'text-[#005f9e]');
                button.classList.add('bg-slate-100', 'text-[#051c2c]');
                indicator.innerHTML = '&#9652;';
            }
        }

        function executeCaseGenerationEngine() {
            const industry = document.getElementById('industry-select').value;
            const caseType = document.getElementById('type-select').value;
            const workspace = document.getElementById('workspace');
            
            workspace.classList.remove('hidden');
            const generatedCaseData = parseCaseEngineLogic(industry, caseType);
            
            workspace.innerHTML = `
                <!-- EXECUTIVE BRIEFING OVERVIEW -->
                <div class="bg-white rounded-lg border border-gray-200 shadow-sm mb-8 overflow-hidden">
                    <div class="bg-[#051c2c] text-white p-6 border-b border-gray-800">
                        <span class="text-xs font-bold uppercase tracking-widest text-[#005f9e] bg-[#051c2c] block mb-1">Active Case Diagnostic Suite</span>
                        <h2 class="text-3xl font-bold tracking-tight">${generatedCaseData.clientName}</h2>
                    </div>
                    <div class="p-8 space-y-6">
                        <div>
                            <h3 class="text-sm font-bold uppercase tracking-wider text-[#051c2c] mb-1">Client Goal</h3>
                            <p class="text-base font-semibold text-gray-900">${generatedCaseData.clientGoal}</p>
                        </div>
                        <hr class="border-gray-100" />
                        <div>
                            <h3 class="text-sm font-bold uppercase tracking-wider text-[#051c2c] mb-2">Situation Description</h3>
                            <div class="text-sm text-gray-700 leading-relaxed space-y-4">${generatedCaseData.situation}</div>
                        </div>
                        <hr class="border-gray-100" />
                        <div>
                            <h3 class="text-sm font-bold uppercase tracking-wider text-[#051c2c] mb-2">McKinsey Study</h3>
                            <div class="bg-slate-50 border-l-4 border-[#051c2c] p-4 text-sm font-medium text-[#051c2c] italic rounded-r">
                                ${generatedCaseData.study}
                            </div>
                        </div>
                    </div>
                </div>

                <div class="text-center mb-8">
                    <h2 class="text-xl font-bold text-gray-800 uppercase tracking-widest">Practice Case Questions</h2>
                    <div class="w-16 h-1 bg-[#005f9e] mx-auto mt-3"></div>
                </div>

                <!-- QUESTION 1 SECTION -->
                <div class="bg-white rounded-lg border border-gray-200 shadow-sm mb-8 overflow-hidden">
                    <div class="p-6 border-b border-gray-100 bg-slate-50/50 flex justify-between items-center">
                        <span class="text-xs font-bold uppercase tracking-wider text-slate-500">Question 1: Structuring (Qualitative Framework)</span>
                    </div>
                    <div class="p-8">
                        <h3 class="text-lg font-bold text-[#051c2c] mb-6">${generatedCaseData.q1_prompt}</h3>
                        <button id="btn-ans-1" onclick="toggleAnswerContainer('ans-1')" class="w-full flex justify-between items-center border border-gray-200 rounded p-4 text-sm font-semibold text-[#005f9e] hover:bg-slate-50 transition bg-white shadow-sm">
                            <span>Reveal Ideal Answer &bull; McKinsey Structural Rubric</span>
                            <span id="ind-ans-1" class="text-xs font-mono">&#9662;</span>
                        </button>
                        <div id="ans-1" class="reveal-content bg-white">
                            <div class="p-6 mt-4 border border-gray-100 bg-slate-50/40 rounded text-sm text-gray-700 leading-relaxed">${generatedCaseData.q1_answer}</div>
                        </div>
                    </div>
                </div>

                <!-- QUESTION 2 SECTION -->
                <div class="bg-white rounded-lg border border-gray-200 shadow-sm mb-8 overflow-hidden">
                    <div class="p-6 border-b border-gray-100 bg-slate-50/50 flex justify-between items-center">
                        <span class="text-xs font-bold uppercase tracking-wider text-slate-500">Question 2: The Quantitative Stress-Test (Math)</span>
                    </div>
                    <div class="p-8">
                        <h3 class="text-lg font-bold text-[#051c2c] mb-6">${generatedCaseData.q2_prompt}</h3>
                        <div class="mb-6 p-3 bg-blue-50 border border-blue-100 text-[#005f9e] text-xs font-semibold rounded">
                            Helpful hint: Calculators are not allowed—you may want to write out your calculations on paper.
                        </div>
                        <button id="btn-ans-2" onclick="toggleAnswerContainer('ans-2')" class="w-full flex justify-between items-center border border-gray-200 rounded p-4 text-sm font-semibold text-[#005f9e] hover:bg-slate-50 transition bg-white shadow-sm">
                            <span>Reveal Ideal Answer &bull; Calculation Chain</span>
                            <span id="ind-ans-2" class="text-xs font-mono">&#9662;</span>
                        </button>
                        <div id="ans-2" class="reveal-content bg-white">
                            <div class="p-6 mt-4 border border-gray-100 bg-slate-50/40 rounded text-sm text-gray-700 leading-relaxed">${generatedCaseData.q2_answer}</div>
                        </div>
                    </div>
                </div>

                <!-- QUESTION 3 SECTION -->
                <div class="bg-white rounded-lg border border-gray-200 shadow-sm mb-8 overflow-hidden">
                    <div class="p-6 border-b border-gray-100 bg-slate-50/50 flex justify-between items-center">
                        <span class="text-xs font-bold uppercase tracking-wider text-slate-500">Question 3: Data Synthesis & Interpretation (The Exhibit)</span>
                    </div>
                    <div class="p-8">
                        <h3 class="text-lg font-bold text-[#051c2c] mb-6">${generatedCaseData.q3_prompt}</h3>
                        
                        <!-- Rich HTML Data Table & Chart Combo -->
                        <div class="w-full bg-white p-6 rounded border border-gray-200 shadow-inner mb-6">
                            <div class="overflow-x-auto mb-8 border border-gray-200 rounded">
                                ${generatedCaseData.dataTable}
                            </div>
                            <div class="w-full h-[320px] relative">
                                <canvas id="canvasRenderZone"></canvas>
                            </div>
                        </div>

                        <button id="btn-ans-3" onclick="toggleAnswerContainer('ans-3')" class="w-full flex justify-between items-center border border-gray-200 rounded p-4 text-sm font-semibold text-[#005f9e] hover:bg-slate-50 transition bg-white shadow-sm">
                            <span>Reveal Ideal Answer &bull; Data Interpretation Framework</span>
                            <span id="ind-ans-3" class="text-xs font-mono">&#9662;</span>
                        </button>
                        <div id="ans-3" class="reveal-content bg-white">
                            <div class="p-6 mt-4 border border-gray-100 bg-slate-50/40 rounded text-sm text-gray-700 leading-relaxed">${generatedCaseData.q3_answer}</div>
                        </div>
                    </div>
                </div>

                <!-- QUESTION 4 SECTION -->
                <div class="bg-white rounded-lg border border-gray-200 shadow-sm mb-8 overflow-hidden">
                    <div class="p-6 border-b border-gray-100 bg-slate-50/50 flex justify-between items-center">
                        <span class="text-xs font-bold uppercase tracking-wider text-slate-500">Question 4: The Strategic Pivot (The Persona Challenge)</span>
                    </div>
                    <div class="p-8">
                        <h3 class="text-lg font-bold text-[#051c2c] mb-6">${generatedCaseData.recommendation_prompt}</h3>
                        <button id="btn-ans-4" onclick="toggleAnswerContainer('ans-4')" class="w-full flex justify-between items-center border border-gray-200 rounded p-4 text-sm font-semibold text-[#005f9e] hover:bg-slate-50 transition bg-white shadow-sm">
                            <span>Reveal Ideal Answer &bull; Executive Mitigation Strategy</span>
                            <span id="ind-ans-4" class="text-xs font-mono">&#9662;</span>
                        </button>
                        <div id="ans-4" class="reveal-content bg-white">
                            <div class="p-6 mt-4 border border-gray-100 bg-slate-50/40 rounded text-sm text-gray-700 leading-relaxed">${generatedCaseData.recommendation_answer}</div>
                        </div>
                    </div>
                </div>
            `;

            executeChartEngineAllocation(generatedCaseData.chartType, generatedCaseData.chartConfig);
            workspace.scrollIntoView({ behavior: 'smooth' });
        }

        function executeChartEngineAllocation(type, config) {
            const canvas = document.getElementById('canvasRenderZone');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            if (globalChartInstance) { globalChartInstance.destroy(); }

            let chartJsConfig = {
                plugins: [{
                    beforeDraw: (chart) => {
                        const cCtx = chart.ctx;
                        cCtx.save();
                        cCtx.fillStyle = '#ffffff';
                        cCtx.fillRect(0, 0, chart.width, chart.height);
                        cCtx.restore();
                    }
                }],
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        title: { display: true, text: config.title, color: '#051c2c', font: { family: 'Inter', size: 14, weight: '700' }, padding: { bottom: 15 } },
                        legend: { display: ['bubble', 'dualAxis', 'stackedBar100', 'groupedBar', 'mixed'].includes(type), labels: { font: { family: 'Inter', size: 11, weight: '500' }, color: '#334155' } }
                    }
                }
            };

            // Programmatic Mapping for Chart generation (Abridged for focus)
            chartJsConfig.type = type === 'waterfall' || type === 'stackedBar100' || type === 'groupedBar' ? 'bar' : type === 'bubble' ? 'bubble' : 'line';
            chartJsConfig.data = config;
            
            if (type === 'waterfall') {
                chartJsConfig.options.scales = { y: { title: { display: true, text: 'Value Impact ($M)' } } };
            } else if (type === 'stackedBar100') {
                chartJsConfig.options.scales = { x: { stacked: true }, y: { stacked: true, max: 100 } };
            } else {
                 chartJsConfig.options.scales = { y: { beginAtZero: true } };
            }

            globalChartInstance = new Chart(ctx, chartJsConfig);
        }

        function parseCaseEngineLogic(industry, type) {
            // ==========================================
            // VARIABILITY ENGINE (Randomized Injection)
            // ==========================================
            const fakeCompanies = ["AeroNova Solutions", "Zenith Biologics", "VeloFoods Global", "Horizon Sovereign", "Vanguard Agritech", "Luxis Premium", "Integra Health", "Solari Power", "TelcoLink", "Stera Advanced Materials", "OmniChannel Logistics"];
            const complications = [
                "a sudden regulatory shift requiring immediate, capital-intensive compliance overhauls.",
                "a massive consumer migration to digital-first channels, rendering their legacy brick-and-mortar assets obsolete.",
                "severe supply chain fragmentation and vendor consolidation driving up sourcing timelines.",
                "an aggressive low-cost competitor entering the domestic market, triggering a fierce price war.",
                "unprecedented inflationary pressure on raw materials squeezing historic gross margins."
            ];
            const financials = [
                "heavy upfront capital investment with strict depreciation milestones",
                "high-variable operational cost structure tied closely to production volume",
                "subscription-based recurring revenue model with high customer acquisition costs",
                "franchise expansion model requiring shared capital burdens"
            ];
            const personas = [
                { title: "Head of Operations", trait: "risk-averse", concern: "quality control failure and process fraud" },
                { title: "Chief Financial Officer (CFO)", trait: "skeptical", concern: "failing to hit strict payback timelines and breakeven metrics" },
                { title: "Chief Executive Officer (CEO)", trait: "impatient", concern: "moving too slowly and losing first-mover advantage" },
                { title: "General Counsel", trait: "compliance-focused", concern: "data privacy violations and legal exposure" }
            ];

            // Random Selections
            const clientName = fakeCompanies[Math.floor(Math.random() * fakeCompanies.length)];
            const selectedComplication = complications[Math.floor(Math.random() * complications.length)];
            const selectedFinancials = financials[Math.floor(Math.random() * financials.length)];
            const selectedPersona = personas[Math.floor(Math.random() * personas.length)];

            // Macro Base Numbers for Math Filter
            const basePopulations = [50, 100, 200]; 
            const targetPop = basePopulations[Math.floor(Math.random() * basePopulations.length)]; // 50M, 100M, 200M
            const demoSplit = [20, 25, 40][Math.floor(Math.random() * 3)]; // 20%, 25%, 40%
            const conversion = [5, 10][Math.floor(Math.random() * 2)]; // 5%, 10%
            
            const rawMarketSize = targetPop * (demoSplit / 100);
            const capturedUsers = rawMarketSize * (conversion / 100); // in Millions
            const capturedUnits = capturedUsers * 1000000;
            
            const unitPrice = (Math.random() * 40 + 20).toFixed(0); // $20 to $60
            const unitCost = (unitPrice * 0.4).toFixed(0); // 40% margin cost
            const unitMargin = unitPrice - unitCost;
            
            const fixedCostM = Math.floor(Math.random() * 5 + 2) * 10; // $20M to $60M
            const breakEvenUnits = (fixedCostM * 1000000) / unitMargin;
            const projectedProfit = (capturedUnits * unitMargin) - (fixedCostM * 1000000);

            // Chart Configuration Logic
            const chartPool = ['waterfall', 'stackedBar100', 'groupedBar'];
            const targetedChartType = chartPool[Math.floor(Math.random() * chartPool.length)];

            let chartConfig = {
                title: `Financial Viability Trajectory`,
                labels: ['Product Line A', 'Product Line B', 'Product Line C'],
                datasets: [
                    { label: 'Revenue ($M)', data: [120, 180, 240], backgroundColor: '#051c2c' },
                    { label: 'Operating Cost ($M)', data: [90, 150, 250], backgroundColor: '#005f9e' }
                ]
            };

            // Structured HTML Data Table with Red Herring
            const dataTableHTML = `
                <table class="min-w-full text-sm text-left text-gray-700 bg-white">
                    <thead class="text-xs text-white uppercase bg-[#051c2c]">
                        <tr>
                            <th class="px-6 py-3">Business Unit</th>
                            <th class="px-6 py-3">Market Share</th>
                            <th class="px-6 py-3">YoY Revenue Growth</th>
                            <th class="px-6 py-3">Net Operating Margin</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr class="border-b hover:bg-slate-50">
                            <td class="px-6 py-4 font-semibold">Flagship Core</td>
                            <td class="px-6 py-4">42%</td>
                            <td class="px-6 py-4 text-green-600 font-medium">+15.2%</td>
                            <td class="px-6 py-4 text-red-600 font-bold">-3.4% (Margin Contraction)</td>
                        </tr>
                        <tr class="border-b hover:bg-slate-50">
                            <td class="px-6 py-4 font-semibold">Secondary Line</td>
                            <td class="px-6 py-4">18%</td>
                            <td class="px-6 py-4 text-gray-600">+2.1%</td>
                            <td class="px-6 py-4 text-green-600 font-bold">+12.8%</td>
                        </tr>
                        <tr class="hover:bg-slate-50">
                            <td class="px-6 py-4 font-semibold">Digital Ventures</td>
                            <td class="px-6 py-4">8%</td>
                            <td class="px-6 py-4 text-green-600 font-medium">+45.0%</td>
                            <td class="px-6 py-4 text-gray-600">+1.2%</td>
                        </tr>
                    </tbody>
                </table>
            `;

            return {
                clientName: clientName,
                title: `${clientName} Strategy`,
                clientGoal: `${clientName} seeks to redefine its competitive strategy and operational boundaries over the next 18 months to ensure sustained enterprise value.`,
                situation: `<p>${clientName} is a deeply entrenched player in the ${industry} space. Historically, the company has operated via a traditional B2B distribution network, generating strong, consistent yields. They command approximately $2B in top-line revenue globally, but volume growth has stalled.</p>
                            <p>Recently, the organization was blindsided by <strong>${selectedComplication}</strong>. This disruption is aggressively eroding their historical moat. Operational complexities are piling up, and the executive team is under massive pressure from activist investors to stem the bleeding and chart a new, aggressive course of action.</p>`,
                study: `The ${selectedPersona.title} and the Board of Directors have engaged McKinsey & Company to evaluate the root causes of this disruption and build a strategic playbook for a ${type.toLowerCase()} initiative.`,
                
                // Question 1: Open-ended qualitative framework
                q1_prompt: `Given the core disruption facing the client, what key operational and market factors should our team evaluate? Build a structured, mutually exclusive, and collectively exhaustive (MECE) approach to assess this. Note: A standard 4Ps or 3Cs framework will not be sufficient here; we need a tailored operational view.`,
                q1_answer: `<div class="space-y-4">
                                <p class="font-bold text-[#051c2c] text-sm uppercase tracking-wide">Custom Structured Approach (MECE):</p>
                                <p class="text-xs text-gray-500 mb-2">A strong candidate will immediately abandon generic textbook frameworks and build buckets specifically addressing the complication.</p>
                                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    <div class="bg-slate-50 p-4 border border-gray-200 rounded">
                                        <p class="font-semibold text-[#005f9e] mb-1">1. Disruption Impact</p>
                                        <ul class="list-disc pl-4 space-y-1 text-xs text-slate-700">
                                            <li>Immediate financial exposure caused by the disruption.</li>
                                            <li>Customer flight risks and churn velocity.</li>
                                        </ul>
                                    </div>
                                    <div class="bg-slate-50 p-4 border border-gray-200 rounded">
                                        <p class="font-semibold text-[#005f9e] mb-1">2. Internal Capability</p>
                                        <ul class="list-disc pl-4 space-y-1 text-xs text-slate-700">
                                            <li>Flexibility of current assets under the new reality.</li>
                                            <li>Capital reserves available to fund a transition.</li>
                                        </ul>
                                    </div>
                                    <div class="bg-slate-50 p-4 border border-gray-200 rounded">
                                        <p class="font-semibold text-[#005f9e] mb-1">3. Strategic Alternatives</p>
                                        <ul class="list-disc pl-4 space-y-1 text-xs text-slate-700">
                                            <li>M&A opportunities to acquire missing capabilities.</li>
                                            <li>Timeline and risks of building solutions in-house.</li>
                                        </ul>
                                    </div>
                                </div>
                            </div>`,
                
                // Question 2: Math
